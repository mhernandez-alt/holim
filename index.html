<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi amigaaaa 💖</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
    }

    h1 {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 40%;
        font-size: 50px;
        color: white;
        text-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .heart {
        position: absolute;
        font-size: 30px;
        cursor: pointer;
        animation: flotar linear infinite;
    }

    @keyframes flotar {
        from {
            transform: translateY(100vh);
        }
        to {
            transform: translateY(-10vh);
        }
    }

    .explosion {
        position: absolute;
        font-size: 20px;
        animation: explode 0.6s forwards;
    }

    @keyframes explode {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(2); opacity: 0; }
    }
</style>
</head>

<body>

<h1>💖 Te quiero mucho amigaaaa 💖</h1>

<script>
function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";

    document.body.appendChild(heart);

    // CLICK = EXPLOSIÓN
    heart.addEventListener("click", () => {
        for (let i = 0; i < 6; i++) {
            const part = document.createElement("div");
            part.classList.add("explosion");
            part.innerText = "💗";

            part.style.left = heart.offsetLeft + "px";
            part.style.top = heart.offsetTop + "px";

            part.style.transform = `translate(${Math.random()*100-50}px, ${Math.random()*100-50}px)`;

            document.body.appendChild(part);

            setTimeout(() => part.remove(), 600);
        }
        heart.remove();
    });

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

// Crear corazones constantemente
setInterval(crearCorazon, 500);
</script>

</body>
</html>
